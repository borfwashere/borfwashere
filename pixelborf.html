<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rutt-Etra Visual Engine - Francisco Borsec</title>
    <style>
        /* ESTÉTICA VENTANA FIJA BORSEC (WIN98) */
        body { 
            margin: 0; 
            background: #018281; /* Verde azulado clásico de escritorio */
            font-family: 'MS Sans Serif', Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Contenedor tipo Ventana (Igual al Pixelsort) */
        .window-container {
            width: 1100px; /* Tamaño controlado */
            background: #c0c0c0;
            border: 2px solid #fff;
            box-shadow: 2px 2px 0px #000;
            display: flex;
            flex-direction: column;
            padding: 2px;
        }

        .viewport { 
            background: #000; 
            margin: 5px; 
            border: 4px inset #ffffff; /* Borde resaltado para profundidad */
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 600px; /* Altura fija para el visor */
            overflow: hidden; 
        }

        canvas { max-width: 100%; max-height: 100%; image-rendering: pixelated; }

        .control-panel { 
            background: #c0c0c0; 
            padding: 10px; 
            border-top: 2px solid #fff; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
        }

        .group { border: 2px groove #fff; padding: 8px; display: flex; flex-direction: column; gap: 5px; position: relative; }
        .group-title { font-size: 11px; font-weight: bold; position: absolute; top: -10px; left: 10px; background: #c0c0c0; padding: 0 5px; color: #000; }

        label { font-size: 11px; display: flex; justify-content: space-between; color: #000080; } /* AZUL ELÉCTRICO PARA ETIQUETAS */
        .val { color: #000080; font-weight: bold; font-family: Consolas, monospace; }

        input[type=range] { margin: 2px 0; cursor: pointer; }

        .win-btn { 
            background: #c0c0c0; border: 2px outset #fff; padding: 4px; 
            font-family: inherit; font-size: 10px; cursor: pointer; 
            box-shadow: 1px 1px #000; color: #000; font-weight: bold; 
            text-transform: uppercase; 
        }
        .win-btn:active { border: 2px inset #fff; box-shadow: none; padding: 5px 3px 3px 5px; }
        .active { background: #e0e0e0; color: #008000 !important; border: 2px inset #fff; }

        video { display: none; }
        #fileInput { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="window-container">
    <div class="viewport">
        <canvas id="canvas"></canvas>
    </div>

    <div class="control-panel">
        <div class="group">
            <span class="group-title">Image Processing</span>
            <label>Density <span id="v-density" class="val">70</span></label>
            <input type="range" id="density" min="10" max="150" value="70">
            
            <label>Relief (Static) <span id="v-relieve" class="val">25</span></label>
            <input type="range" id="relieve" min="0" max="100" value="25">
        </div>

        <div class="group">
            <span class="group-title">Geometry Engine</span>
            <label>Horizontal Rotation <span id="v-horizontal" class="val">0</span></label>
            <input type="range" id="horizontal" min="-180" max="180" value="0">
            
            <label>Vertical Tilt <span id="v-vertical" class="val">15</span></label>
            <input type="range" id="vertical" min="-90" max="90" value="15">

            <label>Digital Zoom <span id="v-zoom" class="val">1.0</span></label>
            <input type="range" id="zoom" min="0.4" max="4" step="0.1" value="1">
        </div>

        <div class="group" style="gap: 8px; justify-content: center;">
            <span class="group-title">Inputs & Controls</span>
            <div style="display: flex; gap: 5px; justify-content: center;">
                <button id="btnOpen" class="win-btn">OPEN VIDEO</button>
                <button id="btnCam" class="win-btn">LIVE CAMERA</button>
            </div>
            <div style="display: flex; gap: 5px; justify-content: center;">
                <button id="btnMic" class="win-btn">MIC REACTIVE</button>
                <button id="btnInv" class="win-btn">INVERSE VIDEO</button>
            </div>
            <button id="btnSnap" class="win-btn" style="color: #000; margin-top: 2px;">SNAP FRAME</button> </div>
    </div>
</div>

<input type="file" id="fileInput" accept="video/*">
<video id="video" loop muted playsinline src="welcome_video.mp4" crossorigin="anonymous"></video>

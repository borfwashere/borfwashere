<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borsec OS - Desktop</title>
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="desktop">
        <fos-bar>
            <fos-menu name="Start">
                <div class="start-header">Francisco Borsec</div>
                <hr>
                <fos-menu-item onclick="openFolder('projects')">My Projects</fos-menu-item>
                <fos-menu-item onclick="openFolder('system')">System Info</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon name="Projects" onclick="openFolder('projects')">
            <div class="icon-wrapper">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
            </div>
        </fos-icon>

        <fos-icon name="System" onclick="openFolder('system')">
            <div class="icon-wrapper">
                <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png">
            </div>
        </fos-icon>

    </fos-desktop>

    <script src="script.js"></script>
</body>
</html>

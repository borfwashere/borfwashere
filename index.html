<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        /* RESET RADICAL PARA EVITAR SCROLL */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; /* Desactiva gestos del navegador por defecto */
        }

        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { display: none !important; }

        html, body { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; height: 100dvh; 
            overflow: hidden !important;
            position: fixed; 
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
            font-family: sans-serif;
            left: 0; top: 0;
        }

        #mainDesktop { 
            position: fixed !important; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; height: 100dvh; 
            z-index: 9999;
            overflow: hidden !important; /* Nada sale de aquí */
        }
        
        fos-icon { 
            width: 70px !important; height: 80px !important; 
            cursor: pointer; position: absolute !important;
            display: flex !important; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .icon-box img { width: 32px !important; height: 32px !important; image-rendering: pixelated; }

        /* ADAPTACIÓN DE VENTANAS */
        @media (max-width: 600px) {
            fos-window {
                width: 96vw !important;
                height: 80dvh !important;
                top: 2dvh !important;
                left: 2vw !important;
            }
            .app-shell iframe { background: #000; }
        }

        .app-shell { width: 100%; height: 100%; background: #000; display: flex; overflow: hidden; }
        iframe { width: 100% !important; height: 100% !important; border: none; }

        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; z-index: 10000; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; }
        
        .readme-content { 
            padding: 20px; background: #fff; color: #000; 
            font-family: "Courier New", Courier, monospace; 
            height: 100%; overflow-y: auto; touch-action: auto; /* Permite scroll solo aquí */
        }
        .folder-content { padding: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="win_kimsort">KimSort</fos-menu-item>
                <fos-menu-item href="win_ruttetra">RutTetra Video</fos-menu-item>
                <fos-menu-item href="win_screensaver">Screensaver</fos-menu-item>
                <fos-menu-item href="win_dit">DIT Engine</fos-menu-item>
                <fos-menu-item href="win_pimpmypaint">PimpMyPaint</fos-menu-item>
                <fos-menu-item href="win_webscape">Webscape</fos-menu-item>
                <fos-menu-item href="win_3d_explorer">3D Explorer</fos-menu-item>
                <fos-menu-item href="win_images">Images</fos-menu-item>
                <fos-menu-item href="win_help">README.txt</fos-menu-item>
                <fos-menu-item href="toys">Toys</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon id="trash-bin" name="Recycle Bin" style="top: 10px; left: 10px;">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_full-4.png"></div>
        </fos-icon>

        <fos-icon href="win_help" name="README" style="top: 100px; left: 10px;">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/notepad-0.png"></div>
        </fos-icon>

        <fos-icon href="win_kimsort" name="KimSort" class="draggable-icon"><div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/display_properties-2.png"></div></fos-icon>
        <fos-icon href="win_ruttetra" name="RutTetra" class="draggable-icon"><div class="icon-box">📼</div></fos-icon>
        <fos-icon href="win_screensaver" name="3D Maze" class="draggable-icon"><div class="icon-box">🖥️</div></fos-icon>
        <fos-icon href="win_dit" name="DIT" class="draggable-icon"><div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/search_file-2.png"></div></fos-icon>
        <fos-icon href="win_pimpmypaint" name="Paint" class="draggable-icon"><div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/paint_old-0.png"></div></fos-icon>
        <fos-icon href="win_webscape" name="Webscape" class="draggable-icon"><div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/world-1.png"></div></fos-icon>
        <fos-icon href="win_3d_explorer" name="3D Explorer" class="draggable-icon"><div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/msie2-2.png"></div></fos-icon>
        <fos-icon href="win_images" name="Images" class="draggable-icon"><div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png"></div></fos-icon>
        <fos-icon href="toys" name="Toys" class="draggable-icon"><div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png"></div></fos-icon>

        <fos-window name="win_help" title="README.txt" width="400" height="300" visible="true">
            <div class="readme-content">
                <h1>🖥️ Borsec Station</h1>
                <p>Ajuste de Canvas bloqueado al 100%.</p>
            </div>
        </fos-window>

        <fos-window name="win_kimsort" title="KimSort" width="900" height="650" visible="false" data-repo="https://borfwashere.github.io/pixelsort/pixelborf.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_ruttetra" title="RutTetra" width="800" height="600" visible="false" data-repo="https://borfwashere.github.io/ruttetra/ruttetra.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_screensaver" title="3D Maze" width="1000" height="700" visible="false" data-repo="https://borfwashere.github.io/screensaver/screensaver.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_dit" title="DIT Project" width="850" height="650" visible="false" data-repo="https://borfwashere.github.io/dit/dit.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_pimpmypaint" title="pimpmypaint" width="960" height="680" visible="false" data-repo="https://borfwashere.github.io/pimpmypaint/"><div class="app-shell"></div></fos-window>
        <fos-window name="win_webscape" title="webscape" width="900" height="650" visible="false" data-repo="https://borfwashere.github.io/web/webscape.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_3d_explorer" title="Reality-Editor" width="1050" height="750" visible="false" data-repo="https://borfwashere.github.io/3dmodel/3dexplorer.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_images" title="Images" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/Images/images.html"><div class="app-shell"></div></fos-window>
        
        <fos-window name="toys" title="Toys" width="500" height="350" visible="false">
            <div class="folder-content">
                <fos-icon href="win_matrix" name="Matrix.exe" style="position:relative !important;"><div class="icon-box">🌐</div></fos-icon>
                <fos-icon href="win_gifsweeper" name="GifSweeper.exe" style="position:relative !important;"><div class="icon-box">🙂</div></fos-icon>
            </div>
        </fos-window>

        <fos-window name="win_matrix" title="Matrix" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/matrix.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_gifsweeper" title="GifSweeper" width="500" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/gifsweeper.html"><div class="app-shell"></div></fos-window>

    </fos-desktop>

    <script>
        // BLOQUEO DE EVENTOS DE SCROLL
        document.addEventListener('touchmove', function(e) {
            if (!e.target.closest('.readme-content')) {
                e.preventDefault();
            }
        }, { passive: false });

        function randomizeIcons() {
            const icons = document.querySelectorAll('.draggable-icon');
            const barHeight = 40;
            // Calculamos límites estrictos para que nada salga de la pantalla
            icons.forEach(icon => {
                const iconWidth = 80;
                const iconHeight = 90;
                const maxX = window.innerWidth - iconWidth - 10;
                const maxY = window.innerHeight - iconHeight - barHeight - 10;
                
                // Aseguramos que no se encimen en los iconos fijos de la izquierda
                icon.style.left = Math.max(100, Math.floor(Math.random() * maxX)) + 'px';
                icon.style.top = Math.max(20, Math.floor(Math.random() * maxY)) + 'px';
            });
        }
        window.addEventListener('load', randomizeIcons);
        window.addEventListener('resize', randomizeIcons);

        document.addEventListener('mousedown', (e) => {
            const path = e.composedPath();
            const trash = path.find(el => el.id === 'trash-bin');
            
            if (trash && e.detail === 2) {
                document.querySelectorAll('fos-window').forEach(win => {
                    const shell = win.querySelector('.app-shell');
                    if (shell) shell.innerHTML = "";
                    win.setAttribute('visible', 'false');
                });
                return;
            }

            const icon = e.target.closest('fos-icon') || e.target.closest('fos-menu-item');
            if (icon && icon.id !== 'trash-bin') {
                const winName = icon.getAttribute('href');
                const win = document.querySelector(`fos-window[name="${winName}"]`);
                if (win) {
                    win.setAttribute('visible', 'true');
                    const shell = win.querySelector('.app-shell');
                    const url = win.getAttribute('data-repo');
                    if (shell && url && shell.innerHTML.trim() === "") {
                        shell.innerHTML = `<iframe src="${url}"></iframe>`;
                    }
                }
            }
        }, true);

        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

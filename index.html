<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        /* 1. RESET DE INTERFAZ Y DESFASE */
        * { box-sizing: border-box; }
        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { display: none !important; }

        body, html { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
        }

        #mainDesktop { position: absolute !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }

        /* 2. ESCALA Y ALINEACIÓN DE ICONOS */
        fos-icon { width: 80px !important; height: 80px !important; }

        .icon-box {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 4px auto;
        }

        .icon-box img { width: 32px; height: 32px; image-rendering: pixelated; }
        .icon-box span { font-size: 24px; line-height: 1; }

        /* 3. CONTENIDO DE CARPETAS */
        .folder-content { 
            padding: 20px; 
            background: #fff; 
            height: 100%; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 15px;
            overflow-y: auto;
        }

        .folder-content fos-icon {
            position: relative !important;
            top: auto !important; left: auto !important;
            margin: 0 auto !important;
        }

        /* 4. BARRA DE TAREAS Y RELOJ */
        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; }
        
        /* 5. VISOR DE APLICACIONES CON PERMISOS */
        iframe { width: 100%; height: 100%; border: none; background: #000; display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="toys">Toys</fos-menu-item>
                <fos-menu-item href="programs">Programs</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon href="toys" name="Toys">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png"></div>
        </fos-icon>

        <fos-icon href="programs" name="Programs">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/modem-1.png"></div>
        </fos-icon>

        <fos-window name="toys" title="C:\Borf\Toys" width="500" height="350">
            <div class="folder-content">
                <fos-icon href="win_matrix" name="Matrix.exe">
                    <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/world-3.png"></div>
                </fos-icon>
                <fos-icon href="win_gifsweeper" name="GifSweeper.exe">
                    <div class="icon-box"><span>🙂</span></div>
                </fos-icon>
            </div>
        </fos-window>

        <fos-window name="programs" title="C:\Borf\Programs" width="500" height="350">
            <div class="folder-content">
                <fos-icon href="win_ruttetra" name="Ruttetra.exe">
                    <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png"></div>
                </fos-icon>
                <fos-icon href="win_pixelsort" name="PixelSort.exe">
                    <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/tree-0.png"></div>
                </fos-icon>
            </div>
        </fos-window>

        <fos-window name="win_matrix" title="Matrix.exe" width="900" height="600" visible="false">
            <iframe src="https://borfwashere.github.io/matrix/matrix.html" allow="camera; microphone; display-capture"></iframe>
        </fos-window>

        <fos-window name="win_gifsweeper" title="GifSweeper.exe" width="500" height="600" visible="false">
            <iframe src="https://borfwashere.github.io/matrix/gifsweeper.html" allow="camera; microphone; display-capture"></iframe>
        </fos-window>

        <fos-window name="win_ruttetra" title="Ruttetra.exe" width="900" height="600" visible="false">
            <iframe src="https://borfwashere.github.io/ruttetraborf/ruttetraborf.html" allow="camera; microphone; display-capture"></iframe>
        </fos-window>

        <fos-window name="win_pixelsort" title="PixelSort.exe" width="900" height="600" visible="false">
            <iframe src="https://borfwashere.github.io/ruttetraborf/pixelborf.html" allow="camera; microphone; display-capture"></iframe>
        </fos-window>

    </fos-desktop>

    <script>
        // Reloj de Sistema
        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

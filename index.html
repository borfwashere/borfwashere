<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { display: none !important; }

        body, html { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important;
            user-select: none;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
        }

        #mainDesktop { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; }
        
        /* Estenedor para las Apps */
        .app-window-content { width: 100%; height: 100%; background: #000; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        .icon-container { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .icon-container img { width: 32px !important; height: 32px !important; image-rendering: pixelated; }

        .folder-content { 
            padding: 20px; background: #fff; height: 100%; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px;
        }
        
        .exe-icon { cursor: pointer; width: 85px; height: 85px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .exe-icon:hover { background-color: #e8f0fe; outline: 1px dotted #000; }
        .exe-label { font-size: 11px; margin-top: 5px; color: #000; font-family: sans-serif; }
    </style>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="readme">ReadMe</fos-menu-item>
                <fos-menu-item href="toys">Toys</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon href="toys" name="Toys">
            <div class="icon-container"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png"></div>
        </fos-icon>

        <fos-icon href="readme" name="ReadMe">
            <div class="icon-container"><img src="https://win98icons.alexmeub.com/icons/png/notepad-2.png"></div>
        </fos-icon>

        <fos-window name="toys" title="C:\Borf\Toys">
            <div class="folder-content">
                <div class="exe-icon" ondblclick="launchApp('matrix', 'Matrix.exe')">
                    <div class="icon-container"><img src="https://win98icons.alexmeub.com/icons/png/world-3.png"></div>
                    <p class="exe-label">Matrix.exe</p>
                </div>
            </div>
        </fos-window>

        <fos-window name="readme" title="System Info">
            <div style="padding: 20px; background: #fff; height: 100%; font-family: sans-serif; font-size: 12px;">
                <h3>Borsec Station v1.0</h3>
                <p>Haz doble clic en los iconos para ejecutar.</p>
            </div>
        </fos-window>
    </fos-desktop>

    <script>
        // Reloj funcional
        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // LANZADOR DE APPS (Crea la ventana si no existe)
        function launchApp(appName, title) {
            const desktop = document.getElementById('mainDesktop');
            const winName = "app_" + appName;

            // Evitar duplicados
            if (document.querySelector(`fos-window[name="${winName}"]`)) {
                document.querySelector(`fos-window[name="${winName}"]`).setAttribute('active', 'true');
                return;
            }

            let url = "";
            if (appName === 'matrix') url = "https://borfwashere.github.io/matrix/matrix.html";
            // Agrega más aquí...

            if (url) {
                const win = document.createElement('fos-window');
                win.setAttribute('name', winName);
                win.setAttribute('title', title);
                win.setAttribute('active', 'true');
                win.setAttribute('width', '800');
                win.setAttribute('height', '600');
                
                win.innerHTML = `<div class="app-window-content"><iframe src="${url}"></iframe></div>`;
                desktop.appendChild(win);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        /* --- 1. ESTILOS DE INTERFAZ (CSS UNIFORME) --- */
        
        /* Limpieza de interferencias */
        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { 
            display: none !important; 
            pointer-events: none !important; 
            visibility: hidden !important;
        }

        body, html { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important;
            /* Bloqueo de selección de texto */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: manipulation;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
        }

        #mainDesktop {
            position: fixed !important;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999999 !important;
        }

        /* Estilos generales de FOS */
        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; font-family: sans-serif; }
        
        fos-window { background-color: #c0c0c0 !important; border: 2px solid; border-color: #fff #808080 #808080 #fff !important; box-shadow: 1px 1px 0 0 #000; }

        /* --- UNIFORMIDAD DE ICONOS --- */
        .icon-container {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto; pointer-events: none;
        }
        .icon-container img {
            width: 32px !important; height: 32px !important;
            image-rendering: pixelated;
            -webkit-user-drag: none; /* Bloqueo de arrastre de imagen */
        }

        /* Rejilla de carpetas (Explorador) */
        .folder-content { 
            padding: 20px;
            background: #fff; /* Fondo blanco tipo explorador real */
            height: 100%; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 10px;
            justify-items: center;
            align-items: start;
            overflow-y: auto;
        }
        
        /* Contenedor del icono .exe */
        .exe-icon { 
            cursor: pointer; 
            width: 85px; height: 85px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid transparent; /* Para evitar saltos con el hover */
        }
        .exe-icon:hover { 
            background-color: #e8f0fe; /* Azul clarito de selección */
            outline: 1px dotted #000080; /* Borde puntitos clásico */
        }
        
        .exe-label {
            font-size: 11px; margin-top: 5px;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            color: #000;
            pointer-events: none; /* No interfiere con el clic del icono */
        }

        /* Estilos especiales que ya tenías */
        .matrix-world { filter: drop-shadow(0 0 4px #00ff00) brightness(1.2) sepia(1) hue-rotate(80deg); }
        .sweeper-emoji { font-size: 28px; text-shadow: 1px 1px 0px #fff; }

        /* Estilo para los iframes de las aplicaciones */
        .app-iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* OPTIMIZACIÓN MÓVIL */
        @media only screen and (max-width: 768px) {
            fos-window {
                width: 95% !important;
                height: 80% !important;
                top: 5% !important;
                left: 2.5% !important;
            }
            .folder-content {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                padding: 10px;
            }
            fos-bar { height: 45px !important; }
            #clock { line-height: 45px; font-size: 14px; }
        }
    </style>
</head>

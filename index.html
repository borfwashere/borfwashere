<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { display: none !important; }
        body, html { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
        }

        #mainDesktop { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; }
        
        .app-container { width: 100%; height: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .exe-icon { cursor: pointer; width: 85px; height: 85px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .exe-icon:hover { background: rgba(0,0,0,0.1); outline: 1px dotted #000; }
        .exe-icon * { pointer-events: none; }

        .folder-content { 
            padding: 20px; background: #fff; height: 100%; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px;
        }
    </style>
</head>
<body>

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="toys">Toys</fos-menu-item>
                <fos-menu-item href="programs">Programs</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon href="toys" name="Toys">
            <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" width="32">
        </fos-icon>

        <fos-icon href="programs" name="Programs">
            <img src="https://win98icons.alexmeub.com/icons/png/modem-1.png" width="32">
        </fos-icon>

        <fos-window name="toys" title="C:\Borf\Toys">
            <div class="folder-content">
                <div class="exe-icon" onclick="openGhost('matrix_win', 'https://borfwashere.github.io/matrix/matrix.html')">
                    <img src="https://win98icons.alexmeub.com/icons/png/world-3.png" width="32">
                    <p style="font-size:11px; margin-top:5px;">Matrix.exe</p>
                </div>
                <div class="exe-icon" onclick="openGhost('gifsweeper_win', 'https://borfwashere.github.io/matrix/gifsweeper.html')">
                    <span style="font-size:24px;">🙂</span>
                    <p style="font-size:11px; margin-top:5px;">GifSweeper.exe</p>
                </div>
            </div>
        </fos-window>

        <fos-window name="programs" title="C:\Borf\Programs">
            <div class="folder-content">
                <div class="exe-icon" onclick="openGhost('ruttetra_win', 'https://borfwashere.github.io/ruttetraborf/ruttetraborf.html')">
                    <img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png" width="32">
                    <p style="font-size:11px; margin-top:5px;">Ruttetra.exe</p>
                </div>
                <div class="exe-icon" onclick="openGhost('pixelsort_win', 'https://borfwashere.github.io/ruttetraborf/pixelborf.html')">
                    <img src="https://win98icons.alexmeub.com/icons/png/tree-0.png" width="32">
                    <p style="font-size:11px; margin-top:5px;">Pixelsort.exe</p>
                </div>
            </div>
        </fos-window>

        <fos-window name="matrix_win" title="Matrix OS" width="900" height="650" visible="false">
            <div id="cont_matrix" class="app-container"></div>
        </fos-window>

        <fos-window name="gifsweeper_win" title="GifSweeper" width="400" height="550" visible="false">
            <div id="cont_gifsweeper" class="app-container"></div>
        </fos-window>

        <fos-window name="ruttetra_win" title="Ruttetra" width="900" height="650" visible="false">
            <div id="cont_ruttetra" class="app-container"></div>
        </fos-window>

        <fos-window name="pixelsort_win" title="PixelSort" width="900" height="650" visible="false">
            <div id="cont_pixelsort" class="app-container"></div>
        </fos-window>

    </fos-desktop>

    <script>
        // Función que activa la ventana fantasma e inyecta el iframe
        function openGhost(winName, url) {
            const win = document.querySelector(`fos-window[name="${winName}"]`);
            const containerId = "cont_" + winName.replace('_win', '');
            const container = document.getElementById(containerId);

            if (win && container) {
                // Solo inyectamos el iframe si el contenedor está vacío
                if (container.innerHTML === "") {
                    container.innerHTML = `<iframe src="${url}"></iframe>`;
                }
                
                // Forzamos a FOS a mostrar y activar la ventana
                win.setAttribute('visible', 'true');
                win.setAttribute('active', 'true');
            }
        }

        // Reloj
        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

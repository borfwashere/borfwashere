<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { display: none !important; }

        body, html { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
        }

        #mainDesktop { position: absolute !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        fos-icon { width: 80px !important; height: 80px !important; cursor: pointer; }

        .icon-box {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 4px auto;
        }

        .icon-box img { width: 32px; height: 32px; image-rendering: pixelated; }
        .icon-box span { font-size: 24px; line-height: 1; }

        .folder-content { 
            padding: 20px; background: #fff; height: 100%; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px;
            overflow-y: auto;
        }

        .folder-content fos-icon { position: relative !important; top: auto !important; left: auto !important; margin: 0 auto !important; }
        
        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; }
        
        .app-shell { width: 100%; height: 100%; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="toys">Toys</fos-menu-item>
                <fos-menu-item href="win_images">Images</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon href="toys" name="Toys">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png"></div>
        </fos-icon>

        <fos-icon href="win_images" name="Images">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png"></div>
        </fos-icon>

        <fos-window name="toys" title="C:\Borf\Toys" width="500" height="350">
            <div class="folder-content">
                <fos-icon href="win_matrix" name="Matrix.exe">
                    <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/world-3.png"></div>
                </fos-icon>
                <fos-icon href="win_gifsweeper" name="GifSweeper.exe">
                    <div class="icon-box"><span>🙂</span></div>
                </fos-icon>
            </div>
        </fos-window>

        <fos-window name="win_images" title="Images Program" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/Images/images.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_matrix" title="Matrix.exe" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/matrix.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_gifsweeper" title="GifSweeper.exe" width="500" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/gifsweeper.html">
            <div class="app-shell"></div>
        </fos-window>

    </fos-desktop>

    <script>
        document.addEventListener('mousedown', (e) => {
            const icon = e.target.closest('fos-icon') || e.target.closest('fos-menu-item');
            const closeBtn = e.target.closest('.fos-window-title-button[data-action="close"]');

            if (icon) {
                const winName = icon.getAttribute('href');
                const win = document.querySelector(`fos-window[name="${winName}"]`);
                
                if (win && winName.startsWith('win_')) {
                    // Maximizar automáticamente para aprovechar el espacio
                    if(typeof win.maximize === 'function') win.maximize();
                    
                    const shell = win.querySelector('.app-shell');
                    const url = win.getAttribute('data-repo');
                    
                    // Retraso pequeño para que la animación de apertura no se trabe
                    setTimeout(() => {
                        if (shell && shell.innerHTML === "") {
                            shell.innerHTML = `<iframe src="${url}" allow="camera; microphone; display-capture"></iframe>`;
                        }
                    }, 350);
                }
            }

            if (closeBtn) {
                const win = closeBtn.closest('fos-window');
                if (win && win.getAttribute('name').startsWith('win_')) {
                    const shell = win.querySelector('.app-shell');
                    if (shell) shell.innerHTML = ""; 
                }
            }
        });

        // Reloj de la barra de tareas
        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

<script>
    function launchApp(appName, title) {
        let url = "";
        let w = 800; // Ancho por defecto
        let h = 600; // Alto por defecto

        // Configuración específica por aplicación
        if (appName === 'matrix') {
            url = "https://borfwashere.github.io/matrix/matrix.html";
            w = 1000; h = 700;
        } 
        else if (appName === 'gifsweeper') {
            url = "https://borfwashere.github.io/matrix/gifsweeper.html";
            w = 400; h = 500; // Más pequeño como el buscaminas real
        }
        else if (appName === 'ruttetra') {
            url = "https://borfwashere.github.io/ruttetraborf/ruttetraborf.html";
            w = 900; h = 650;
        } 
        else if (appName === 'pixelsort') {
            url = "https://borfwashere.github.io/ruttetraborf/pixelborf.html";
            w = 900; h = 650;
        }

        if (url) {
            const desktop = document.getElementById('mainDesktop');
            const winId = "win_" + appName;

            // Si la ventana ya está abierta, la traemos al frente
            let existingWin = document.querySelector(`fos-window[name="${winId}"]`);
            if (existingWin) {
                existingWin.setAttribute('active', 'true');
                return;
            }

            // Creamos la ventana de Borsec Station
            const newWin = document.createElement('fos-window');
            newWin.setAttribute('name', winId);
            newWin.setAttribute('title', title);
            newWin.setAttribute('active', 'true');
            newWin.setAttribute('width', w);
            newWin.setAttribute('height', h);

            // Estilos para que el iframe sea invisible y perfecto
            newWin.innerHTML = `
                <div style="width:100%; height:100%; overflow:hidden; background:#000;">
                    <iframe src="${url}" 
                            style="width:100%; height:100%; border:none;" 
                            loading="lazy">
                    </iframe>
                </div>
            `;

            desktop.appendChild(newWin);
        }
    }
</script>

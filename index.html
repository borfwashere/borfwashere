<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station v1.3</title>
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>
    <style>
        #tumblr_controls, .tmblr-iframe { display: none !important; }
        body, html { 
            background-color: #008080; margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
        }
        #mainDesktop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        fos-bar { background: #c0c0c0; border-top: 1px solid #fff; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; font-family: sans-serif; }
        fos-window { background-color: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; }
        
        .folder-content { padding: 20px; background: #fff; height: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; }
        .exe-icon { cursor: pointer; width: 85px; height: 85px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .exe-icon:hover { background-color: #e8f0fe; outline: 1px dotted #000; }
        .exe-label { font-size: 11px; margin-top: 5px; color: #000; font-family: sans-serif; }

        /* Contenedor donde se inyectará el programa */
        .app-viewport { width: 100%; height: 100%; overflow: auto; background: #000; color: #0f0; }
    </style>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="toys">Toys</fos-menu-item>
                <fos-menu-item href="programs">Programs</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon href="toys" name="Toys">
            <div style="text-align:center"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" width="32"></div>
        </fos-icon>

        <fos-window name="toys" title="C:\Borf\Toys">
            <div class="folder-content">
                <div class="exe-icon" onclick="injectApp('Matrix.exe', 'https://borfwashere.github.io/matrix/matrix.html')">
                    <img src="https://win98icons.alexmeub.com/icons/png/world-3.png" width="32">
                    <p class="exe-label">Matrix.exe</p>
                </div>
            </div>
        </fos-window>
    </fos-desktop>

    <script>
        // SEGURIDAD BORSEC
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // FUNCIÓN DE INYECCIÓN (OCULTA EL LINK Y EVITA BLOQUEOS)
        async function injectApp(title, url) {
            try {
                const response = await fetch(url);
                const html = await response.text();
                
                const desktop = document.getElementById('mainDesktop');
                const win = document.createElement('fos-window');
                win.setAttribute('name', title.replace('.', '_'));
                win.setAttribute('title', title);
                win.style.width = "90vw";
                win.style.height = "80vh";
                
                // Creamos un contenedor limpio e inyectamos el código directamente
                const container = document.createElement('div');
                container.className = "app-viewport";
                
                // Usamos un Shadow DOM o simplemente inyectamos el HTML
                // Esto hace que el programa sea parte de TU página, eliminando el link
                container.innerHTML = html;
                
                win.appendChild(container);
                desktop.appendChild(win);

                // Ejecutar scripts del programa inyectado manualmente
                const scripts = container.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

            } catch (err) {
                alert("Error al cargar el programa: Borsec Security Block.");
                console.error(err);
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

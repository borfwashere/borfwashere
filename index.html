<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { display: none !important; }

        body, html { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
            font-family: sans-serif;
        }

        #mainDesktop { position: absolute !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        
        fos-icon { 
            width: 80px !important; 
            height: 90px !important; 
            cursor: pointer; 
            position: absolute !important;
            display: flex !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .icon-box {
            width: 32px; 
            height: 32px;
            display: flex !important; 
            align-items: center; 
            justify-content: center;
            margin-bottom: 4px;
            font-size: 24px;
        }

        /* EFECTO DE PIXELADO PARA EMOJIS EN ESCRITORIO */
        .pixelated-emoji {
            image-rendering: pixelated;
            font-family: "Courier New", Courier, monospace;
            filter: contrast(200%) brightness(110%) blur(0.3px); 
            transform: scale(1.1);
        }

        .icon-box img, .menu-icon { 
            width: 32px !important; 
            height: 32px !important; 
            display: block !important;
            image-rendering: pixelated; 
        }

        .menu-icon-small {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            vertical-align: middle;
            font-size: 12px;
        }
        
        .menu-icon-small.pixelated-emoji {
            font-size: 14px;
            filter: contrast(200%) blur(0.2px); 
        }

        .app-shell { width: 100%; height: 100%; background: #000; display: flex; }
        iframe { width: 100% !important; height: 100% !important; border: none; flex-grow: 1; }

        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; font-family: sans-serif; }
        .folder-content { padding: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold; font-family: sans-serif;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="win_kimsort">
                    <span class="menu-icon-small"><img src="https://win98icons.alexmeub.com/icons/png/display_properties-2.png" style="width:16px;height:16px;"></span> KimSort
                </fos-menu-item>
                <fos-menu-item href="win_ruttetra">
                    <span class="menu-icon-small pixelated-emoji">📼</span> RutTetra Video
                </fos-menu-item>
                <fos-menu-item href="win_screensaver">
                    <span class="menu-icon-small pixelated-emoji">🖥️</span> Screensaver
                </fos-menu-item>
                <fos-menu-item href="win_dit">
                    <span class="menu-icon-small"><img src="https://win98icons.alexmeub.com/icons/png/search_file-2.png" style="width:16px;height:16px;"></span> DIT Engine
                </fos-menu-item>
                <fos-menu-item href="win_pimpmypaint">
                    <span class="menu-icon-small"><img src="https://win98icons.alexmeub.com/icons/png/paint_old-0.png" style="width:16px;height:16px;"></span> PimpMyPaint
                </fos-menu-item>
                <fos-menu-item href="win_webscape">
                    <span class="menu-icon-small"><img src="https://win98icons.alexmeub.com/icons/png/world-1.png" style="width:16px;height:16px;"></span> Webscape
                </fos-menu-item>
                <fos-menu-item href="win_3d_explorer">
                    <span class="menu-icon-small"><img src="https://win98icons.alexmeub.com/icons/png/msie2-2.png" style="width:16px;height:16px;"></span> 3D Explorer
                </fos-menu-item>
                <fos-menu-item href="win_images">
                    <span class="menu-icon-small"><img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" style="width:16px;height:16px;"></span> Images
                </fos-menu-item>
                <fos-menu-item href="toys">
                    <span class="menu-icon-small"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" style="width:16px;height:16px;"></span> Toys
                </fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon href="win_kimsort" name="KimSort" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/display_properties-2.png"></div>
        </fos-icon>

        <fos-icon href="win_ruttetra" name="RutTetra" class="draggable-icon">
            <div class="icon-box pixelated-emoji">📼</div>
        </fos-icon>

        <fos-icon href="win_screensaver" name="Screensaver" class="draggable-icon">
            <div class="icon-box pixelated-emoji">🖥️</div>
        </fos-icon>

        <fos-icon href="win_dit" name="DIT" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/search_file-2.png"></div>
        </fos-icon>

        <fos-icon href="win_pimpmypaint" name="pimpmypaint" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/paint_old-0.png"></div>
        </fos-icon>

        <fos-icon href="win_webscape" name="webscape" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/world-1.png"></div>
        </fos-icon>

        <fos-icon href="win_3d_explorer" name="3D Explorer" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/msie2-2.png"></div>
        </fos-icon>

        <fos-icon href="win_images" name="Images" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png"></div>
        </fos-icon>

        <fos-icon href="toys" name="Toys" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png"></div>
        </fos-icon>

        <fos-window name="win_kimsort" title="KimSort" width="900" height="650" visible="false" data-repo="https://borfwashere.github.io/pixelsort/pixelborf.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_ruttetra" title="RutTetra" width="800" height="600" visible="false" data-repo="https://borfwashere.github.io/ruttetra/ruttetra.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_screensaver" title="3D Maze" width="1000" height="700" visible="false" data-repo="https://borfwashere.github.io/screensaver/screensaver.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_dit" title="DIT Project" width="850" height="650" visible="false" data-repo="https://borfwashere.github.io/dit/dit.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_pimpmypaint" title="pimpmypaint" width="960" height="680" visible="false" data-repo="https://borfwashere.github.io/pimpmypaint/"><div class="app-shell"></div></fos-window>
        <fos-window name="win_webscape" title="webscape" width="900" height="650" visible="false" data-repo="https://borfwashere.github.io/web/webscape.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_3d_explorer" title="Reality-Editor v1.0" width="1050" height="750" visible="false" data-repo="https://borfwashere.github.io/3dmodel/3dexplorer.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_images" title="Images" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/Images/images.html"><div class="app-shell"></div></fos-window>

        <fos-window name="toys" title="C:\Borf\Toys" width="500" height="350" visible="false">
            <div class="folder-content">
                <fos-icon href="win_matrix" name="Matrix.exe" style="position:relative !important;"><div class="icon-box pixelated-emoji">🌐</div></fos-icon>
                <fos-icon href="win_gifsweeper" name="GifSweeper.exe" style="position:relative !important;"><div class="icon-box pixelated-emoji">🙂</div></fos-icon>
            </div>
        </fos-window>

        <fos-window name="win_matrix" title="Matrix.exe" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/matrix.html"><div class="app-shell"></div></fos-window>
        <fos-window name="win_gifsweeper" title="GifSweeper.exe" width="500" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/gifsweeper.html"><div class="app-shell"></div></fos-window>

    </fos-desktop>

    <script>
        function randomizeIcons() {
            const icons = document.querySelectorAll('#mainDesktop > fos-icon.draggable-icon');
            icons.forEach(icon => {
                const maxX = window.innerWidth - 100;
                const maxY = window.innerHeight - 130;
                icon.style.left = (Math.random() * maxX + 10) + 'px';
                icon.style.top = (Math.random() * maxY + 10) + 'px';
            });
        }

        window.addEventListener('load', randomizeIcons);
        
        document.addEventListener('mousedown', (e) => {
            const icon = e.target.closest('fos-icon') || e.target.closest('fos-menu-item');
            if (icon) {
                const winName = icon.getAttribute('href');
                const win = document.querySelector(`fos-window[name="${winName}"]`);
                if (win) {
                    win.setAttribute('visible', 'true');
                    if (typeof win.bringToFront === 'function') win.bringToFront();
                    
                    if (winName.startsWith('win_')) {
                        const shell = win.querySelector('.app-shell');
                        const url = win.getAttribute('data-repo');
                        if (shell && shell.innerHTML.trim() === "") {
                            shell.innerHTML = `<iframe src="${url}"></iframe>`;
                        }
                    }
                }
            }

            const path = e.composedPath();
            const closeBtn = path.find(el => el.classList && el.classList.contains('fos-window-title-button') && el.dataset.action === "close");
            if (closeBtn) {
                const win = closeBtn.getRootNode().host;
                if (win) {
                    const shell = win.querySelector('.app-shell');
                    if (shell) shell.innerHTML = ""; 
                    win.setAttribute('visible', 'false');
                }
            }
        });

        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

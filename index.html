<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsec Station</title>
    
    <link rel="stylesheet" href="https://victorribeiro.com/css/main.min.css">
    <script src="https://victorribeiro.com/js/fos.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        #tumblr_controls, .tmblr-iframe, .knight-rider-bar, #reg_banner { display: none !important; }

        body, html { 
            background-color: #008080 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
        }

        #mainDesktop { position: absolute !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        
        fos-icon { 
            width: 80px !important; 
            height: 90px !important; 
            cursor: pointer; 
            position: absolute !important;
            display: block !important;
        }

        .icon-box {
            width: 32px; 
            height: 32px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0 auto;
        }

        .icon-box img { 
            width: 32px !important; 
            height: 32px !important; 
            display: block !important;
            image-rendering: pixelated; 
        }

        .app-shell { 
            width: 100%; height: 100%; 
            background: #000; 
            display: flex;
        }
        
        iframe { 
            width: 100% !important; 
            height: 100% !important; 
            border: none; 
            flex-grow: 1;
        }

        fos-bar { background: #c0c0c0 !important; border-top: 1px solid #fff !important; }
        #clock { color: #000; padding: 0 10px; line-height: 30px; font-size: 11px; border-left: 1px solid #808080; }
        
        .folder-content { padding: 10px; display: flex; gap: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <fos-desktop id="mainDesktop">
        <fos-bar>
            <fos-menu name="Start">
                <div style="padding: 5px 10px; font-weight: bold;">Borsec Francisco</div>
                <hr>
                <fos-menu-item href="win_screensaver">
                    <img src="https://win98icons.alexmeub.com/icons/png/channels_screen_saver-2.png" style="width:16px;height:16px;vertical-align:middle;margin-right:8px;image-rendering:pixelated;">
                    Screensaver (3D)
                </fos-menu-item>
                <fos-menu-item href="win_dit">
                    <img src="https://win98icons.alexmeub.com/icons/png/search_file-2.png" style="width:16px;height:16px;vertical-align:middle;margin-right:8px;image-rendering:pixelated;">
                    DIT Engine
                </fos-menu-item>
                <fos-menu-item href="win_pimpmypaint">
                    <img src="https://win98icons.alexmeub.com/icons/png/paint_old-0.png" style="width:16px;height:16px;vertical-align:middle;margin-right:8px;image-rendering:pixelated;">
                    pimpmypaint
                </fos-menu-item>
                <fos-menu-item href="win_webscape">
                    <img src="https://win98icons.alexmeub.com/icons/png/world-1.png" style="width:16px;height:16px;vertical-align:middle;margin-right:8px;image-rendering:pixelated;">
                    webscape
                </fos-menu-item>
                <fos-menu-item href="win_3d_explorer">Reality-Editor 3D</fos-menu-item>
                <fos-menu-item href="win_images">Images</fos-menu-item>
                <fos-menu-item href="toys">Toys</fos-menu-item>
            </fos-menu>
            <div id="clock">00:00</div>
        </fos-bar>

        <fos-icon href="win_screensaver" name="Screensaver" class="draggable-icon">
            <div class="icon-box">
                <img src="https://win98icons.alexmeub.com/icons/png/channels_screen_saver-2.png" alt="Icon">
            </div>
        </fos-icon>

        <fos-icon href="win_dit" name="DIT" class="draggable-icon">
            <div class="icon-box">
                <img src="https://win98icons.alexmeub.com/icons/png/search_file-2.png" alt="Icon">
            </div>
        </fos-icon>

        <fos-icon href="win_pimpmypaint" name="pimpmypaint" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/paint_old-0.png"></div>
        </fos-icon>

        <fos-icon href="win_webscape" name="webscape" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/world-1.png"></div>
        </fos-icon>

        <fos-icon href="win_3d_explorer" name="3D Explorer" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/msie2-2.png"></div>
        </fos-icon>

        <fos-icon href="win_images" name="Images" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png"></div>
        </fos-icon>

        <fos-icon href="toys" name="Toys" class="draggable-icon">
            <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png"></div>
        </fos-icon>

        <fos-window name="win_screensaver" title="3D Maze Screensaver" width="1000" height="700" visible="false" data-repo="https://borfwashere.github.io/screensaver/screensaver.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_dit" title="DIT Project" width="850" height="650" visible="false" data-repo="https://borfwashere.github.io/dit/dit.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_pimpmypaint" title="pimpmypaint" width="960" height="680" visible="false" data-repo="https://borfwashere.github.io/pimpmypaint/">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_webscape" title="webscape" width="900" height="650" visible="false" data-repo="https://borfwashere.github.io/web/webscape.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_3d_explorer" title="Reality-Editor v1.0" width="1050" height="750" visible="false" data-repo="https://borfwashere.github.io/3dmodel/3dexplorer.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_images" title="Images" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/Images/images.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="toys" title="C:\Borf\Toys" width="500" height="350">
            <div class="folder-content">
                <fos-icon href="win_matrix" name="Matrix.exe" style="position:relative !important;">
                    <div class="icon-box"><img src="https://win98icons.alexmeub.com/icons/png/world-3.png"></div>
                </fos-icon>
                <fos-icon href="win_gifsweeper" name="GifSweeper.exe" style="position:relative !important;">
                    <div class="icon-box"><span>🙂</span></div>
                </fos-icon>
            </div>
        </fos-window>

        <fos-window name="win_matrix" title="Matrix.exe" width="900" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/matrix.html">
            <div class="app-shell"></div>
        </fos-window>

        <fos-window name="win_gifsweeper" title="GifSweeper.exe" width="500" height="600" visible="false" data-repo="https://borfwashere.github.io/matrix/gifsweeper.html">
            <div class="app-shell"></div>
        </fos-window>

    </fos-desktop>

    <script>
        function randomizeIcons() {
            const icons = document.querySelectorAll('#mainDesktop > fos-icon.draggable-icon');
            const padding = 20;
            const barHeight = 40;
            const iconW = 80, iconH = 90;

            icons.forEach(icon => {
                const maxX = window.innerWidth - iconW - padding;
                const maxY = window.innerHeight - iconH - barHeight - padding;
                const randomX = Math.floor(Math.random() * maxX) + padding;
                const randomY = Math.floor(Math.random() * maxY) + padding;
                icon.style.left = randomX + 'px';
                icon.style.top = randomY + 'px';
            });
        }

        window.addEventListener('load', randomizeIcons);
        window.addEventListener('resize', randomizeIcons);

        document.addEventListener('mousedown', (e) => {
            const icon = e.target.closest('fos-icon') || e.target.closest('fos-menu-item');
            const closeBtn = e.target.closest('.fos-window-title-button[data-action="close"]');

            if (icon) {
                const winName = icon.getAttribute('href');
                const win = document.querySelector(`fos-window[name="${winName}"]`);
                
                if (win) {
                    win.setAttribute('visible', 'true');
                    if (typeof win.bringToFront === 'function') win.bringToFront();
                    
                    const titleText = win.shadowRoot.querySelector('.fos-window-title-text');
                    if (titleText && !titleText.querySelector('img')) {
                        let iconUrl = "";
                        if (winName === 'win_webscape') iconUrl = "https://win98icons.alexmeub.com/icons/png/world-1.png";
                        if (winName === 'win_images') iconUrl = "https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png";
                        if (winName === 'win_pimpmypaint') iconUrl = "https://win98icons.alexmeub.com/icons/png/paint_old-0.png";
                        if (winName === 'win_dit') iconUrl = "https://win98icons.alexmeub.com/icons/png/search_file-2.png";
                        // Mantener el mismo icono de monitor en la barra de título
                        if (winName === 'win_screensaver') iconUrl = "https://win98icons.alexmeub.com/icons/png/channels_screen_saver-2.png";
                        
                        if (iconUrl) {
                            titleText.innerHTML = `<img src="${iconUrl}" style="width:16px;height:16px;vertical-align:middle;margin-right:6px;image-rendering:pixelated;"> ${win.getAttribute('title')}`;
                        }
                    }

                    if (winName.startsWith('win_')) {
                        const shell = win.querySelector('.app-shell');
                        const url = win.getAttribute('data-repo');
                        if (shell && shell.innerHTML.trim() === "") {
                            setTimeout(() => {
                                shell.innerHTML = `<iframe src="${url}" allow="camera; microphone; display-capture; autoplay" style="width:100%; height:100%; border:none;"></iframe>`;
                            }, 150);
                        }
                    }
                }
            }

            if (closeBtn) {
                const win = closeBtn.closest('fos-window');
                if (win && win.getAttribute('name').startsWith('win_')) {
                    const shell = win.querySelector('.app-shell');
                    if (shell) shell.innerHTML = ""; 
                    win.setAttribute('visible', 'false');
                }
            }
        });

        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
